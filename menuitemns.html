<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Dashboard - Tapnstream Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-yellow: #ffcb45;
            --bg-gray: #f4f7f6;
            --text-dark: #1a1a1a;
            --text-light: #888;
            --accent-teal: #066b5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: #e0e5e2; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .dashboard {
            background: var(--bg-gray);
            width: 1200px;
            height: 850px;
            border-radius: 24px;
            display: grid;
            grid-template-columns: 200px 1fr 320px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* --- LEFT SIDEBAR --- */
        .sidebar { padding: 30px 20px; background: #fff; border-right: 1px solid #eee; }
        .back-btn { display: flex; align-items: center; gap: 10px; font-weight: 700; margin-bottom: 40px; cursor: pointer; }
        
        .stat-card {
            padding: 15px;
            background: var(--primary-yellow);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
        }
        .stat-card h4 { font-size: 14px; }
        .stat-card p { font-size: 24px; font-weight: 800; }

        /* --- MAIN CONTENT --- */
        .main-content { padding: 30px; overflow-y: auto; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .menu-card {
            background: #fff;
            padding: 15px;
            border-radius: 16px;
            position: relative;
            transition: 0.3s;
        }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .food-img {
            width: 100%;
            height: 140px;
            background: #ddd;
            border-radius: 12px;
            margin-bottom: 12px;
            background-size: cover;
            background-position: center;
        }
        .badge {
            position: absolute; top: 25px; right: 25px;
            padding: 4px 10px; border-radius: 20px;
            font-size: 10px; color: white; font-weight: 600; background: #4a69bd;
        }

        .card-info h3 { font-size: 14px; margin-bottom: 8px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .price { font-weight: 800; color: var(--accent-teal); }
        
        .counter { display: flex; align-items: center; gap: 10px; background: #f8f8f8; padding: 4px 10px; border-radius: 20px; }
        .btn-count { background: var(--accent-teal); color: white; border: none; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; }

        /* --- RIGHT PANEL --- */
        .order-panel { background: #fff; padding: 30px 20px; border-left: 1px solid #eee; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="back-btn">← Back</div>
        <div class="stat-card" onclick="alert('Refreshing list...')">
            <h4>Menu Items</h4>
            <p id="item-count">0</p>
        </div>
    </div>

    <!-- Main Section -->
    <div class="main-content">
        <div class="menu-grid" id="food-container">
            <!-- Data yahan load hoga -->
             <p>Loading menu...</p>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="order-panel">
        <h3 class="order-title">Your Order</h3>
        <div id="order-list">
            <p style="color: #999; font-size: 12px;">No items selected</p>
        </div>
    </div>
</div>

<script>
    // 1. Apni API ka URL yahan likhein
    const API_URL = "http://localhost:5000"; 
    let cart = {};

    fetch(`${API_URL}/item`)
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById("food-container");
        const countDisplay = document.getElementById("item-count");
        
        container.innerHTML = ""; 
        countDisplay.innerText = data.length; // Dashboard par total items show honge

        data.forEach(item => {
            const itemId = item._id || item.id;
            cart[itemId] = 1; // Default quantity

            container.innerHTML += `
                <div class="menu-card">
                    <span class="badge">★ Popular</span>
                    <div class="food-img" style="background-image: url('${item.IMAGEURL}')"></div>
                    
                    <div class="card-info">
                        <h3>${item.ItemName}</h3>
                        <p style="font-size: 10px; color: #888;">Deliciously prepared fresh meal.</p>
                        
                        <div class="card-footer">
                            <span class="price">Rs. ${item.Price}</span>
                            <div class="counter">
                                </div>
                        </div>
                    </div>
                </div>
            `;
        });
    })
    .catch(err => {
        console.error("ERROR:", err);
        document.getElementById("food-container").innerHTML = "<p>Failed to load data. Check API URL.</p>";
    });

</script>

</body>
</html>
